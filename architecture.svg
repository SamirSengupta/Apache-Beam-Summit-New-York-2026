<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <style>
      .title{font-size:26px;font-weight:700;fill:#0f172a}
      .sub{font-size:14px;fill:#64748b}
      .box{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:14}
      .label{font-size:17px;font-weight:700;fill:#0f172a}
      .desc{font-size:12.5px;fill:#475569}
      .tag{font-size:11px;font-weight:700;fill:#fff}
      .pill{font-size:12px;fill:#1e293b}
    </style>
  </defs>

  <!-- header -->
  <text x="40" y="46" class="title">Real-Time Fraud Detection in Apache Beam</text>
  <text x="40" y="70" class="sub">Streaming transactions &#8594; RAG retrieval &#8594; live LLM inference &#8212; one Beam pipeline, same code on a laptop or on Dataflow</text>

  <!-- pipeline band -->
  <rect x="30" y="110" width="1120" height="200" rx="18" fill="#f1f5f9" stroke="#e2e8f0"/>
  <rect x="30" y="110" width="180" height="30" rx="15" fill="url(#hdr)"/>
  <text x="48" y="131" class="tag">APACHE BEAM PIPELINE</text>

  <!-- Stage 1: Source -->
  <rect x="55" y="165" width="190" height="115" class="box" rx="14"/>
  <circle cx="80" cy="192" r="11" fill="#0ea5e9"/>
  <text x="100" y="197" class="label">Stream source</text>
  <text x="72" y="226" class="desc">StreamTransactions</text>
  <text x="72" y="245" class="desc">1 event / 2 sec</text>
  <text x="72" y="264" class="desc" fill="#0ea5e9">&#8594; prod: Kafka / PubSub</text>

  <!-- Stage 2: Embed + RAG -->
  <rect x="290" y="165" width="200" height="115" class="box" rx="14"/>
  <circle cx="315" cy="192" r="11" fill="#6366f1"/>
  <text x="335" y="197" class="label">RAG retrieve</text>
  <text x="307" y="226" class="desc">embed &#8594; vector search</text>
  <text x="307" y="245" class="desc">top-k fraud patterns</text>
  <text x="307" y="264" class="desc" fill="#6366f1">FAISS (numpy fallback)</text>

  <!-- Stage 3: LLM -->
  <rect x="535" y="165" width="200" height="115" class="box" rx="14"/>
  <circle cx="560" cy="192" r="11" fill="#8b5cf6"/>
  <text x="580" y="197" class="label">LLM classify</text>
  <text x="552" y="226" class="desc">prompt + context</text>
  <text x="552" y="245" class="desc">verdict + risk + reason</text>
  <text x="552" y="264" class="desc" fill="#8b5cf6">setup() loads once/worker</text>

  <!-- Stage 4: Sink -->
  <rect x="780" y="165" width="190" height="115" class="box" rx="14"/>
  <circle cx="805" cy="192" r="11" fill="#10b981"/>
  <text x="825" y="197" class="label">Output / sink</text>
  <text x="797" y="226" class="desc">FRAUD / REVIEW / LEGIT</text>
  <text x="797" y="245" class="desc">color + risk bar</text>
  <text x="797" y="264" class="desc" fill="#10b981">&#8594; prod: alerts / DB</text>

  <!-- decision out -->
  <rect x="1015" y="178" width="120" height="88" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="1075" y="212" text-anchor="middle" class="label" fill="#047857">Decision</text>
  <text x="1075" y="236" text-anchor="middle" class="desc" fill="#047857">in real time</text>

  <!-- arrows -->
  <line x1="245" y1="222" x2="288" y2="222" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="222" x2="533" y2="222" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="735" y1="222" x2="778" y2="222" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="970" y1="222" x2="1013" y2="222" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- knowledge base feeding RAG -->
  <rect x="290" y="350" width="200" height="74" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="390" y="380" text-anchor="middle" class="label" fill="#4338ca">Vector DB</text>
  <text x="390" y="402" text-anchor="middle" class="desc" fill="#4338ca">known fraud patterns</text>
  <line x1="390" y1="350" x2="390" y2="282" stroke="#6366f1" stroke-width="2.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

  <!-- LLM endpoint feeding LLM -->
  <rect x="535" y="350" width="200" height="74" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="635" y="380" text-anchor="middle" class="label" fill="#6d28d9">LLM endpoint</text>
  <text x="635" y="402" text-anchor="middle" class="desc" fill="#6d28d9">OpenAI-compatible API</text>
  <line x1="635" y1="350" x2="635" y2="282" stroke="#8b5cf6" stroke-width="2.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

  <!-- fallback note -->
  <rect x="780" y="350" width="190" height="74" rx="12" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
  <text x="875" y="377" text-anchor="middle" class="label" fill="#b45309">Safety net</text>
  <text x="875" y="398" text-anchor="middle" class="desc" fill="#b45309">rule-based fallback</text>
  <text x="875" y="414" text-anchor="middle" class="desc" fill="#b45309">if LLM unreachable</text>

  <!-- footer pills -->
  <rect x="30" y="458" width="1120" height="44" rx="12" fill="#0f172a"/>
  <text x="55" y="485" class="tag" fill="#93c5fd">Each box = a Beam ParDo (DoFn)</text>
  <text x="360" y="485" class="tag" fill="#a5b4fc">Beam parallelizes every stage</text>
  <text x="650" y="485" class="tag" fill="#c4b5fd">Same code &#8594; DirectRunner (laptop) or DataflowRunner (cloud)</text>
</svg>
